    <!-- //! Units in CSS 
A unit is the standard for the measurement of physical quantity of the same kind.
There are three types of  CSS units we have:
1. Absolute unit (which is fixed, not change)
Absolute units are fixed and do not changes regardless of the screen size, zoom level or device resolution.
Ex  pixel, mm, cm.

2. Relative unit (which is changeable)
Relative units are relative to another property. They are changeable.
Ex  %, rem (root element(changes their size wrt their root)), em (element).

3. Viewport unit 
Viewport unit are also relative unit which is dependent on the size of the screen (changes size wrt thrie screen size).
Ex  vh (viewport height) -- total height of the screen.
    vw (viewport width) -- total width of the screen.
-->
